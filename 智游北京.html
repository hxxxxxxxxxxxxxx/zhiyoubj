    function getDescriptionsForSpot(name) {
        return spotLiteraryDescriptions[name] || {
            poetic: `“${name}，在时光的转角处，静候你的到来。”`,
            humorous: `听说去了${name}，朋友圈的赞都会多一倍！`,
            simple: `${name}是北京必去的景点之一，历史悠久。`,
            poem: `${name}，岁月如歌。`
        };
    }

    function formatDuration(minutes) {
        if (minutes < 60) return `${minutes}分钟`;
        const hours = Math.floor(minutes / 60);
        const mins = minutes % 60;
        return mins > 0 ? `${hours}小时${mins}分钟` : `${hours}小时`;
    }

    function findSpotKey(name) {
        for (let [key, value] of Object.entries(placesDB)) {
            if (value.keywords && value.keywords.some(k => name.includes(k))) return key;
            if (key === name || value.name === name) return key;
        }
        return null;
    }

    let map = null, markers = [], currentPlan = null, currentSpotKey = null;
    let walkingRoutes = [], transitRoutes = [], drivingRoutes = [];
    let currentDestinationLngLat = null;
    let multiMap = null;

    // ==================== 辅助函数 ====================
    function showPage(pageId, skipTransition = false) {
        if (!skipTransition) {
            const overlay = document.getElementById('transitionOverlay');
            overlay.classList.add('active');
            setTimeout(() => { overlay.classList.remove('active'); }, 300);
        }
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(`page-${pageId}`).classList.add('active');
        if (pageId === 'history') renderHistory();
        if (pageId === 'profile') updateProfileUI();
    }
    function transitionToPage(pageId) { showPage(pageId, false); }

    function extractSpotsFromText(text) {
        let found = [];
        for (let [key, value] of Object.entries(placesDB)) {
            if (value.keywords.some(kw => text.includes(kw))) found.push(key);
        }
        if (found.length === 0) return ['故宫', '天坛'];
        return found.slice(0, 5);
    }

    async function callDeepSeek(prompt) {
        try {
            const response = await fetch('https://api.deepseek.com/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${DEEPSEEK_API_KEY}` },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: [
                        { role: 'system', content: '你是一个北京旅游规划助手。根据用户需求，返回 JSON 格式：{"spots":["景点1","景点2",...], "days":整数, "cost":整数, "message":"寄语"}' },
                        { role: 'user', content: prompt }
                    ],
                    response_format: { type: 'json_object' }
                })
            });
            if (response.ok) {
                const data = await response.json();
                return JSON.parse(data.choices[0].message.content);
            }
        } catch(e) { console.warn('真实API调用失败，使用模拟规划', e); }
        const spots = extractSpotsFromText(prompt);
        const days = Math.min(spots.length, 3);
        const cost = spots.length * 150 + Math.floor(Math.random() * 200);
        const message = `根据您的需求，为您推荐了 ${spots.map(s => placesDB[s].name).join('、')} 等景点。祝您旅途愉快！`;
        return { spots, days, cost, message };
    }

    function getCrowdLevel(spotName) {
        const hour = new Date().getHours();
        if (hour >= 10 && hour <= 16) return { level: '拥挤', wait: '30-60分钟' };
        if (hour >= 8 && hour <= 18) return { level: '较拥挤', wait: '15-30分钟' };
        return { level: '舒适', wait: '5-10分钟' };
    }

    // 弹窗：选项卡切换

        const modal = document.getElementById('spotModal');
        const modalImg = document.getElementById('modalImg');

        if (imgUrl.includes('.md.png')) imgUrl = imgUrl.replace('.md.png', '.png');
        modalImg.src = imgUrl;
        
        const descs = getDescriptionsForSpot(spot.name);
        const styles = ['poetic', 'humorous', 'simple', 'poem'];
        const styleNames = { poetic: '📖 文艺风', humorous: '😂 幽默风', simple: '🗣️ 通俗风', poem: '📜 诗歌风' };

        const contentDiv = document.getElementById('styleContent');
        tabsDiv.innerHTML = '';
        styles.forEach(style => {

    function initTags() {
        const tagGrid = document.getElementById('tagGrid');
        const allTags = Object.keys(placesDB);
        tagGrid.innerHTML = '';
        allTags.forEach(tag => {
            const btn = document.createElement('div');
            btn.className = 'tag-btn';
            btn.innerText = placesDB[tag].name;
            btn.onclick = function() {
                this.classList.toggle('active');
                const input = document.getElementById('aiInput');
                let currentTags = input.value.split(/[、,，]/).map(s => s.trim()).filter(Boolean);
                if (this.classList.contains('active')) {
                    if (!currentTags.includes(tag)) currentTags.push(tag);
                } else {
                    currentTags = currentTags.filter(t => t !== tag);
                }
                input.value = currentTags.join('、');
            };
            tagGrid.appendChild(btn);
        });
        const btns = document.querySelectorAll('.tag-btn');
        if (btns.length >= 2) { btns[0].click(); btns[1].click(); }

    async function startGeneration() {
        const inputVal = document.getElementById('aiInput').value.trim();
        if (!inputVal) { alert('请输入或选择景点'); return; }
        transitionToPage('loading');
        const progressBar = document.getElementById('progressBar');
        progressBar.style.width = '0%';
        let progress = 0;
        const timer = setInterval(() => {
            progress += 2;
            progressBar.style.width = progress + '%';
            if (progress >= 100) clearInterval(timer);
        }, 50);
        try {
            const aiData = await callDeepSeek(inputVal);
            currentPlan = {
                spots: aiData.spots.slice(0,5),
                days: aiData.days || Math.ceil(aiData.spots.length / 2),
                cost: aiData.cost || 500,
                message: aiData.message || '祝您旅途愉快！'
            };
            renderResultPage();
            clearInterval(timer);
            progressBar.style.width = '100%';
            setTimeout(() => { transitionToPage('result'); }, 300);
        } catch(err) {
            console.error(err);
            alert('规划失败，请重试');
            transitionToPage('home');
        }
    }

        container.innerHTML = '';

            const crowd = getCrowdLevel(spot.name);

                <div class="spot-icon"><img src="${spot.icon}" onerror="this.src='https://via.placeholder.com/80'"></div>
                <div class="spot-name">${spot.name}</div>
                <div class="spot-desc">${spot.desc}</div>
                <div class="crowd-info">👥 ${crowd.level} · ⏱️ 排队 ${crowd.wait}</div>
            </div>`;
        });
        document.getElementById('routeInfo').innerHTML = `<span>预计用时: ${currentPlan.days} 天</span><span>约花费: ¥${currentPlan.cost}</span>`;
        if (map) map.destroy();
        map = new AMap.Map('mapContainer', { zoom: 12, center: [116.397428, 39.90923], viewMode: '2D' });
        markers.forEach(m => map.remove(m)); markers = [];
        
        // 使用自定义HTML标记（小卡片）
        spotsData.forEach((spot, idx) => {

    async function selectSpot(spotName) {
        let spotKey = findSpotKey(spotName);
        if (!spotKey) {
            for (let [key, value] of Object.entries(placesDB)) {
                if (value.name === spotName) { spotKey = key; break; }
            }
        }
        if (!spotKey) { alert('暂不支持该景点导航'); return; }
        const spot = placesDB[spotKey];
        currentSpotKey = spotKey;
        currentDestinationLngLat = spot.lnglat;
        transitionToPage('transit');
        let origin = [116.397428, 39.90923];
        try {
            const pos = await getCurrentPosition();
            origin = [pos.lng, pos.lat];
        } catch(e) { console.warn('使用默认位置'); }
        await fetchAllRoutes(origin, spot.lnglat);
        renderRouteList('walking');
    }

    function getCurrentPosition() {
        return new Promise((resolve, reject) => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    pos => resolve({ lng: pos.coords.longitude, lat: pos.coords.latitude }),
                    err => reject(err)
                );
            } else reject(new Error('不支持定位'));
        });
    }

    async function fetchAllRoutes(origin, destination) {
        walkingRoutes = await getRouteList(origin, destination, 'walking');
        transitRoutes = await getRouteList(origin, destination, 'transit');
        drivingRoutes = await getRouteList(origin, destination, 'driving');
    }

    function getRouteList(origin, dest, type) {
        return new Promise((resolve) => {
            let plugin, method, isTransfer = false;
            let options = {};
            if (type === 'walking') { plugin = 'AMap.Walking'; method = 'search'; }
            else if (type === 'transit') { plugin = 'AMap.Transfer'; method = 'search'; isTransfer = true; options = { city: '北京' }; }
            else { plugin = 'AMap.Driving'; method = 'search'; }
            AMap.plugin(plugin, () => {
                const handler = new AMap[plugin.split('.')[1]](options);
                handler[method](origin, dest, (status, result) => {
                    if (status === 'complete') {
                        let routes = [];
                        if (isTransfer) {
                            const plans = result.plans || [];
                            routes = plans.map(plan => ({
                                duration: Math.round((plan.time) / 60),
                                distance: (plan.distance / 1000).toFixed(1),
                                cost: plan.cost || '0',
                                steps: (plan.segments || []).map(seg => ({
                                    instruction: seg.instruction,
                                    distance: seg.distance,
                                    duration: seg.time
                                }))
                            }));
                            resolve(routes);
                        } else {
                            routes = result.routes || [result];
                            resolve(routes.map(route => ({
                                duration: Math.round((route.duration || route.time) / 60),
                                distance: (route.distance / 1000).toFixed(1),
                                cost: route.cost,
                                steps: route.steps || []
                            })));
                        }
                    } else { resolve([]); }
                });
            });
        });
    }

    function renderRouteList(type) {
        let routes = [];
        if (type === 'walking') routes = walkingRoutes;
        else if (type === 'transit') routes = transitRoutes;
        else routes = drivingRoutes;
        const container = document.getElementById('routeList');
        if (!routes.length) { container.innerHTML = '<div style="padding:20px;text-align:center;">暂无路线方案</div>'; return; }
        container.innerHTML = '';
        routes.forEach((route, idx) => {
            const div = document.createElement('div');
            div.className = 'route-item';
            div.innerHTML = `<div class="route-title">方案${idx+1}</div>
                <div class="route-detail"><span>⏱️ ${formatDuration(route.duration)}</span><span>📏 ${route.distance}km</span>${route.cost ? `<span>💰 ¥${route.cost}</span>` : ''}</div>`;
            div.onclick = () => showNavDetail(route);
            container.appendChild(div);
        });
    }

    function showNavDetail(route) {
        const timeline = document.getElementById('timeline');
        timeline.innerHTML = '';
        if (!route.steps.length) { timeline.innerHTML = '<div style="padding:20px;text-align:center;">无详细步骤</div>'; transitionToPage('navdetail'); return; }
        route.steps.forEach((step, idx) => {
            const instruction = step.instruction.replace(/<[^>]+>/g, '');
            const distance = step.distance ? (step.distance / 1000).toFixed(1) + 'km' : '';
            const duration = step.duration ? formatDuration(Math.round(step.duration / 60)) : '';
            let icon = '🚶';
            if (instruction.includes('公交')) icon = '🚌';
            else if (instruction.includes('地铁')) icon = '🚇';
            else if (instruction.includes('驾车')) icon = '🚗';
            timeline.innerHTML += `
                <div class="step-card">
                    <div class="step-icon">${icon}</div>
                    <div class="step-content">
                        <div class="step-instruction">${instruction}</div>
                        <div class="step-info">${distance} ${duration}</div>
                    </div>
                </div>
            `;
        });
        const navBtn = document.createElement('div');
        navBtn.className = 'nav-btn';
        navBtn.innerText = '开始导航';
        navBtn.onclick = () => {
            if (currentDestinationLngLat) {
                getCurrentPosition().then(pos => {
                    const origin = `${pos.lng},${pos.lat}`;
                    const dest = `${currentDestinationLngLat[0]},${currentDestinationLngLat[1]}`;
                    const url = `https://uri.amap.com/navigation?to=${dest}&from=${origin}&mode=car&callnative=1`;
                    window.open(url, '_blank');
                }).catch(() => {
                    const dest = `${currentDestinationLngLat[0]},${currentDestinationLngLat[1]}`;
                    const url = `https://uri.amap.com/navigation?to=${dest}&mode=car&callnative=1`;
                    window.open(url, '_blank');
                });
            } else alert('无法获取目的地');
        };
        timeline.appendChild(navBtn);
        transitionToPage('navdetail');
    }

    async function startMultiRoute() {
        if (!currentPlan || !currentPlan.spots.length) {
            alert('请先生成行程规划');
            return;
        }
        const spots = currentPlan.spots.map(key => placesDB[key]).filter(s => s);
        if (spots.length < 2) {
            alert('至少选择两个景点才能串联游览');

        }
        let origin = [116.397428, 39.90923];
        try {
            const pos = await getCurrentPosition();
            origin = [pos.lng, pos.lat];
        } catch(e) { console.warn('使用默认起点'); }
        const orderedSpots = await getOptimalRoute(origin, spots);
        renderMultiRoutePage(origin, orderedSpots);
        showPage('multi-route');
    }

    async function getOptimalRoute(origin, spots) {
        const n = spots.length;
        const distMatrix = Array(n).fill().map(() => Array(n).fill(0));
        const originToSpot = [];
        for (let i = 0; i < n; i++) {
            const d = await getDistanceAndDuration(origin, spots[i].lnglat);
            originToSpot.push(d.distance);
        }
        for (let i = 0; i < n; i++) {
            for (let j = i+1; j < n; j++) {
                const d = await getDistanceAndDuration(spots[i].lnglat, spots[j].lnglat);
                distMatrix[i][j] = d.distance;
                distMatrix[j][i] = d.distance;
            }
        }
        let bestOrder = [];
        let minDist = Infinity;
        if (n <= 7) {
            const indices = [...Array(n).keys()];
            const permute = (arr, start) => {
                if (start === arr.length - 1) {
                    let total = originToSpot[arr[0]];
                    for (let i = 0; i < arr.length - 1; i++) total += distMatrix[arr[i]][arr[i+1]];
                    if (total < minDist) { minDist = total; bestOrder = [...arr]; }
                    return;
                }
                for (let i = start; i < arr.length; i++) {
                    [arr[start], arr[i]] = [arr[i], arr[start]];
                    permute(arr, start + 1);
                    [arr[start], arr[i]] = [arr[i], arr[start]];
                }
            };
            permute(indices, 0);
        } else {
            let remaining = [...Array(n).keys()];
            let current = remaining.reduce((a,b) => originToSpot[a] < originToSpot[b] ? a : b, 0);
            bestOrder.push(current);
            remaining = remaining.filter(i => i !== current);
            while (remaining.length) {
                let nearest = remaining[0];
                let nearestDist = distMatrix[current][nearest];
                for (let i of remaining) {
                    if (distMatrix[current][i] < nearestDist) { nearestDist = distMatrix[current][i]; nearest = i; }
                }
                bestOrder.push(nearest);
                remaining = remaining.filter(i => i !== nearest);
                current = nearest;
            }
        }
        return bestOrder.map(idx => spots[idx]);
    }

    function getDistanceAndDuration(origin, dest) {
        return new Promise((resolve) => {
            AMap.plugin('AMap.Walking', () => {
                const walking = new AMap.Walking();
                walking.search(origin, dest, (status, result) => {
                    if (status === 'complete' && result.routes && result.routes.length > 0) {
                        const route = result.routes[0];
                        resolve({ distance: route.distance, duration: route.time });
                    } else {
                        const d = Math.sqrt(Math.pow(origin[0]-dest[0],2)+Math.pow(origin[1]-dest[1],2)) * 100000;
                        resolve({ distance: d, duration: d / 1.4 });
                    }
                });
            });
        });
    }

    async function renderMultiRoutePage(origin, orderedSpots) {
        const orderContainer = document.getElementById('multiSpotOrder');
        orderContainer.innerHTML = '';
        orderedSpots.forEach((spot, idx) => {
            orderContainer.innerHTML += `<div class="spot-card" style="width:auto; min-width:80px;"><div class="spot-icon"><img src="${spot.icon}" style="width:40px;height:40px;border-radius:12px;"></div><div class="spot-name">${idx+1}. ${spot.name}</div></div>`;
        });
        let totalDist = 0, totalTime = 0;
        const firstLeg = await getDistanceAndDuration(origin, orderedSpots[0].lnglat);
        totalDist += firstLeg.distance; totalTime += firstLeg.duration;
        for (let i = 0; i < orderedSpots.length - 1; i++) {
            const leg = await getDistanceAndDuration(orderedSpots[i].lnglat, orderedSpots[i+1].lnglat);
            totalDist += leg.distance; totalTime += leg.duration;
        }
        document.getElementById('multiRouteInfo').innerHTML = `<span>总距离: ${(totalDist/1000).toFixed(1)} km</span><span>总时间: ${formatDuration(Math.round(totalTime/60))}</span>`;
        if (multiMap) multiMap.destroy();
        multiMap = new AMap.Map('multiMapContainer', { zoom: 12, center: orderedSpots[0].lnglat, viewMode: '2D' });
        orderedSpots.forEach((spot, idx) => {
            const marker = new AMap.Marker({ position: spot.lnglat, title: `${idx+1}. ${spot.name}`, label: { content: `${idx+1}`, offset: new AMap.Pixel(0, -30) } });
            multiMap.add(marker);
        });
        const allPoints = [];
        const points1 = await getRoutePoints(origin, orderedSpots[0].lnglat);
        allPoints.push(...points1);
        for (let i = 0; i < orderedSpots.length - 1; i++) {
            const points = await getRoutePoints(orderedSpots[i].lnglat, orderedSpots[i+1].lnglat);
            allPoints.push(...points);
        }
        if (allPoints.length) {
            const polyline = new AMap.Polyline({ path: allPoints, strokeColor: '#4658E8', strokeWeight: 4, strokeOpacity: 0.8 });
            multiMap.add(polyline);
            multiMap.setFitView();
        }
        document.getElementById('startMultiNavBtn').onclick = () => startMultiNavigation(origin, orderedSpots);
    }

    function getRoutePoints(origin, dest) {
        return new Promise((resolve) => {
            AMap.plugin('AMap.Walking', () => {
                const walking = new AMap.Walking();
                walking.search(origin, dest, (status, result) => {
                    if (status === 'complete' && result.routes && result.routes[0]) {
                        const points = result.routes[0].steps.flatMap(step => 
                            step.polyline.split(';').map(p => {
                                const [lng, lat] = p.split(',');
                                return [parseFloat(lng), parseFloat(lat)];
                            })
                        );
                        resolve(points);
                    } else resolve([origin, dest]);
                });
            });
        });
    }

    async function startMultiNavigation(origin, orderedSpots) {
        let currentPos = origin;
        try {
            const pos = await getCurrentPosition();
            currentPos = [pos.lng, pos.lat];
        } catch(e) {}
        let url = `https://uri.amap.com/navigation?from=${currentPos[0]},${currentPos[1]}&to=${orderedSpots[0].lnglat[0]},${orderedSpots[0].lnglat[1]}`;
        if (orderedSpots.length > 1) {
            const waypoints = orderedSpots.slice(1).map(s => `${s.lnglat[0]},${s.lnglat[1]}`).join('|');
            url += `&via=${waypoints}`;
        }
        url += `&mode=car&callnative=1`;
        window.open(url, '_blank');
    }

    function saveHistory(plan) {
        let history = JSON.parse(localStorage.getItem('tripHistory') || '[]');
        history.unshift({ id: Date.now(), time: new Date().toLocaleString(), spots: plan.spots, days: plan.days, cost: plan.cost, summary: plan.spots.map(s => placesDB[s]?.name || s).join('、'), detail: `${plan.days}天 | ¥${plan.cost}` });
        localStorage.setItem('tripHistory', JSON.stringify(history));
        renderHistory();
    }
    function renderHistory() {
        const container = document.getElementById('historyList');
        const history = JSON.parse(localStorage.getItem('tripHistory') || '[]');
        if (!history.length) { container.innerHTML = '<div class="empty-tip">暂无历史记录</div>'; return; }
        container.innerHTML = '';
        history.forEach(item => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<div class="history-time">${item.time}</div><div class="history-summary">${item.summary}</div><div class="history-detail">${item.detail}</div>`;
            div.onclick = () => { currentPlan = { spots: item.spots, days: item.days, cost: item.cost, message: "历史规划" }; renderResultPage(); transitionToPage('result'); };
            container.appendChild(div);
        });
    }
    function handleLogin() {
        const userInfo = JSON.parse(localStorage.getItem('userInfo'));
        if (userInfo) { if (confirm('是否退出登录？')) { localStorage.removeItem('userInfo'); updateProfileUI(); } }
        else { const nickName = prompt('请输入昵称', '旅行者'); if (nickName) { localStorage.setItem('userInfo', JSON.stringify({ nickName, avatar: '👤' })); updateProfileUI(); } }
    }
    function updateProfileUI() {
        const userInfo = JSON.parse(localStorage.getItem('userInfo'));
        const userNameSpan = document.getElementById('userName');
        const loginBtn = document.getElementById('loginBtn');
        const avatarDiv = document.getElementById('avatarBtn');
        if (userInfo) {
            userNameSpan.innerText = userInfo.nickName;
            loginBtn.innerHTML = '<span>退出登录</span> <span>></span>';
            avatarDiv.innerHTML = userInfo.avatar || '👤';
        } else {
            userNameSpan.innerText = '未登录';
            loginBtn.innerHTML = '<span>登录 / 注册</span> <span>></span>';
            avatarDiv.innerHTML = '👤';
        }
    }

    window.onload = () => {
        initTags();
        initTabs();
        AMap.plugin(['AMap.Walking', 'AMap.Transfer', 'AMap.Driving'], () => console.log('高德插件就绪'));
        renderHistory();
        updateProfileUI();
        window.onclick = function(event) {
            const modal = document.getElementById('spotModal');
            if (event.target === modal) closeModal();
        };
    };
</script>
